name: Spring Boot CI/CD to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make application.properties
      run: |
        mkdir -p ./src/main/resources
        echo "${{ secrets.APPLICATION_PROPERTIES }}" > ./src/main/resources/application.properties

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew clean build -x test

    - name: Copy jar to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "build/libs/*-SNAPSHOT.jar"
        target: "/home/${{ secrets.EC2_USERNAME }}/main/"
        strip_components: 2

    - name: Execute script on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          CURRENT_PID=$(pgrep -f .jar)
          if [ -z "$CURRENT_PID" ]; then
              echo "실행 중인 애플리케이션이 없습니다."
          else
              echo "실행 중인 애플리케이션 종료: $CURRENT_PID"
              kill -15 $CURRENT_PID
              sleep 5
          fi
          
          echo "새로운 애플리케이션 배포 시작"
          nohup java -Xmx512m -jar /home/${{ secrets.EC2_USERNAME }}/main/*-SNAPSHOT.jar > /home/${{ secrets.EC2_USERNAME }}/main/app.log 2>&1 &
